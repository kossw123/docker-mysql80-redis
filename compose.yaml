services:
  server:
    build:
      context: ./server
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: mysql+pymysql://root:test@db:3306/mydb
      REDIS_URL: redis://redis:6379

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: mydb
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      

volumes:
  db-data:
  redis-data: